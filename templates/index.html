<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXUS_CHAT // Secure Node</title>
    <script src="https://cdn.socket.io/4.5.0/socket.io.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;600;700;900&family=Exo+2:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --void: #020408;
            --abyss: #030810;
            --panel: rgba(4, 16, 32, 0.92);
            --panel-bright: rgba(6, 22, 44, 0.95);
            --cyan: #00f5ff;
            --cyan-dim: rgba(0, 245, 255, 0.15);
            --cyan-glow: rgba(0, 245, 255, 0.6);
            --magenta: #ff006e;
            --magenta-dim: rgba(255, 0, 110, 0.12);
            --gold: #ffd700;
            --text: #c8e8ff;
            --text-dim: #4a7a9b;
            --text-muted: #2a4a6b;
            --border: rgba(0, 245, 255, 0.15);
            --border-bright: rgba(0, 245, 255, 0.4);
            --font-display: 'Orbitron', monospace;
            --font-mono: 'Share Tech Mono', monospace;
            --font-body: 'Exo 2', sans-serif;
            --scan-speed: 4s;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: var(--font-body);
            background: var(--void);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* ── BACKGROUND LAYERS ── */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse 80% 60% at 20% 80%, rgba(0,245,255,0.04) 0%, transparent 60%),
                radial-gradient(ellipse 60% 80% at 80% 20%, rgba(255,0,110,0.04) 0%, transparent 60%),
                radial-gradient(ellipse 40% 40% at 50% 50%, rgba(0,245,255,0.02) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
            animation: ambientPulse 8s ease-in-out infinite alternate;
        }

        @keyframes ambientPulse {
            0% { opacity: 0.6; }
            100% { opacity: 1; }
        }

        /* Grid overlay */
        .grid-bg {
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(0,245,255,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,245,255,0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
            z-index: 0;
            animation: gridDrift 30s linear infinite;
        }

        @keyframes gridDrift {
            0% { transform: translateY(0); }
            100% { transform: translateY(40px); }
        }

        /* Scanline */
        .scanline {
            position: fixed;
            top: -100%;
            left: 0;
            right: 0;
            height: 40%;
            background: linear-gradient(transparent, rgba(0,245,255,0.015), transparent);
            pointer-events: none;
            z-index: 1;
            animation: scan var(--scan-speed) linear infinite;
        }

        @keyframes scan {
            0% { top: -40%; }
            100% { top: 100%; }
        }

        /* Corner decorations */
        .corner-deco {
            position: fixed;
            width: 120px;
            height: 120px;
            pointer-events: none;
            z-index: 2;
        }
        .corner-deco.tl { top: 20px; left: 20px; border-top: 1px solid var(--cyan); border-left: 1px solid var(--cyan); opacity: 0.3; }
        .corner-deco.tr { top: 20px; right: 20px; border-top: 1px solid var(--cyan); border-right: 1px solid var(--cyan); opacity: 0.3; }
        .corner-deco.bl { bottom: 20px; left: 20px; border-bottom: 1px solid var(--cyan); border-left: 1px solid var(--cyan); opacity: 0.3; }
        .corner-deco.br { bottom: 20px; right: 20px; border-bottom: 1px solid var(--cyan); border-right: 1px solid var(--cyan); opacity: 0.3; }

        /* Floating particles */
        .particle {
            position: fixed;
            width: 2px;
            height: 2px;
            background: var(--cyan);
            border-radius: 50%;
            pointer-events: none;
            z-index: 1;
            animation: floatParticle linear infinite;
            opacity: 0;
        }

        @keyframes floatParticle {
            0% { transform: translateY(100vh) translateX(0); opacity: 0; }
            10% { opacity: 0.6; }
            90% { opacity: 0.3; }
            100% { transform: translateY(-20px) translateX(var(--drift)); opacity: 0; }
        }

        /* ── CONTAINER ── */
        .container {
            position: relative;
            z-index: 10;
            width: 95%;
            max-width: 500px;
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 4px;
            overflow: hidden;
            backdrop-filter: blur(20px);
            box-shadow:
                0 0 0 1px rgba(0,245,255,0.05),
                0 0 60px rgba(0,245,255,0.08),
                0 0 120px rgba(0,245,255,0.04),
                inset 0 1px 0 rgba(0,245,255,0.1);
            animation: containerBoot 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes containerBoot {
            0% { opacity: 0; transform: scale(0.94) translateY(20px); filter: blur(4px); }
            60% { filter: blur(0); }
            100% { opacity: 1; transform: scale(1) translateY(0); }
        }

        /* Container corner accents */
        .container::before,
        .container::after {
            content: '';
            position: absolute;
            width: 20px;
            height: 20px;
            pointer-events: none;
            z-index: 20;
        }
        .container::before {
            top: -1px; left: -1px;
            border-top: 2px solid var(--cyan);
            border-left: 2px solid var(--cyan);
        }
        .container::after {
            bottom: -1px; right: -1px;
            border-bottom: 2px solid var(--cyan);
            border-right: 2px solid var(--cyan);
        }

        /* ── HEADER ── */
        .header {
            padding: 18px 24px;
            background: rgba(0, 245, 255, 0.03);
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: relative;
            overflow: hidden;
        }

        .header::after {
            content: '';
            position: absolute;
            bottom: 0; left: 0; right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--cyan), transparent);
            animation: headerLine 3s ease-in-out infinite;
        }

        @keyframes headerLine {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }

        .header-brand {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-icon {
            position: relative;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .logo-hex {
            width: 28px;
            height: 28px;
            border: 1.5px solid var(--cyan);
            transform: rotate(45deg);
            position: relative;
            animation: logoSpin 8s linear infinite;
            box-shadow: 0 0 10px var(--cyan-glow), inset 0 0 10px rgba(0,245,255,0.1);
        }

        .logo-dot {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) rotate(-45deg);
            width: 6px;
            height: 6px;
            background: var(--cyan);
            border-radius: 50%;
            box-shadow: 0 0 8px var(--cyan);
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes logoSpin {
            0% { transform: rotate(45deg); }
            100% { transform: rotate(405deg); }
        }

        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 6px var(--cyan), 0 0 12px var(--cyan); opacity: 1; }
            50% { box-shadow: 0 0 15px var(--cyan), 0 0 30px var(--cyan); opacity: 0.7; }
        }

        .brand-text h1 {
            font-family: var(--font-display);
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 3px;
            color: var(--cyan);
            text-shadow: 0 0 20px var(--cyan-glow);
            line-height: 1;
        }

        .brand-text p {
            font-family: var(--font-mono);
            font-size: 9px;
            color: var(--text-muted);
            letter-spacing: 2px;
            margin-top: 3px;
        }

        .header-status {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 4px;
        }

        .status-badge {
            font-family: var(--font-mono);
            font-size: 9px;
            color: var(--cyan);
            letter-spacing: 1px;
            background: var(--cyan-dim);
            border: 1px solid rgba(0,245,255,0.2);
            padding: 2px 8px;
            border-radius: 2px;
        }

        .signal-bars {
            display: flex;
            gap: 2px;
            align-items: flex-end;
        }

        .signal-bar {
            width: 3px;
            background: var(--cyan);
            border-radius: 1px;
            box-shadow: 0 0 4px var(--cyan);
            animation: signalAnim 1.5s ease-in-out infinite;
        }

        .signal-bar:nth-child(1) { height: 4px; animation-delay: 0s; }
        .signal-bar:nth-child(2) { height: 7px; animation-delay: 0.15s; }
        .signal-bar:nth-child(3) { height: 10px; animation-delay: 0.3s; }
        .signal-bar:nth-child(4) { height: 7px; animation-delay: 0.45s; }

        @keyframes signalAnim {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }

        /* ── JOIN SECTION ── */
        .join-section {
            padding: 28px 24px;
        }

        .section-title {
            font-family: var(--font-mono);
            font-size: 10px;
            letter-spacing: 3px;
            color: var(--text-muted);
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .section-title::after {
            content: '';
            flex: 1;
            height: 1px;
            background: linear-gradient(90deg, var(--border), transparent);
        }

        /* Input Groups */
        .input-group {
            margin-bottom: 18px;
            opacity: 0;
            animation: slideUp 0.5s ease-out forwards;
            position: relative;
        }

        .input-group:nth-child(1) { animation-delay: 0.2s; }
        .input-group:nth-child(2) { animation-delay: 0.35s; }
        .input-group:nth-child(3) { animation-delay: 0.5s; }

        @keyframes slideUp {
            0% { opacity: 0; transform: translateY(12px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        .input-group label {
            display: block;
            font-family: var(--font-mono);
            font-size: 9px;
            letter-spacing: 2px;
            color: var(--text-muted);
            margin-bottom: 8px;
        }

        .input-wrapper {
            position: relative;
        }

        .input-prefix {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            font-family: var(--font-mono);
            font-size: 12px;
            color: var(--cyan);
            pointer-events: none;
            z-index: 1;
        }

        .input-group input {
            width: 100%;
            padding: 13px 16px 13px 34px;
            background: rgba(0, 245, 255, 0.03);
            color: var(--text);
            border: 1px solid var(--border);
            border-radius: 3px;
            font-family: var(--font-mono);
            font-size: 13px;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            position: relative;
        }

        .input-group input:focus {
            outline: none;
            border-color: var(--cyan);
            background: rgba(0, 245, 255, 0.06);
            box-shadow: 0 0 0 1px rgba(0,245,255,0.2), 0 0 20px rgba(0,245,255,0.08), inset 0 0 20px rgba(0,245,255,0.04);
            color: var(--cyan);
        }

        .input-group input::placeholder {
            color: var(--text-muted);
            font-size: 11px;
        }

        /* Focus glow line */
        .input-glow {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            height: 1px;
            background: var(--cyan);
            transform: scaleX(0);
            transition: transform 0.3s ease;
            box-shadow: 0 0 8px var(--cyan);
        }

        .input-group input:focus ~ .input-glow {
            transform: scaleX(1);
        }

        .optional-tag {
            font-size: 9px;
            color: var(--text-muted);
            letter-spacing: 1px;
            font-family: var(--font-mono);
        }

        /* Lock toggle */
        .label-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .small-lock {
            cursor: pointer;
            color: var(--text-muted);
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 5px;
            border-radius: 3px;
            background: rgba(0,245,255,0.04);
            border: 1px solid var(--border);
        }

        .small-lock:hover {
            color: var(--cyan);
            border-color: var(--cyan);
            box-shadow: 0 0 8px rgba(0,245,255,0.2);
        }

        .small-lock.is-locked {
            color: var(--cyan);
            border-color: var(--cyan);
            background: var(--cyan-dim);
            box-shadow: 0 0 12px rgba(0,245,255,0.3);
        }

        /* Button */
        .btn-join {
            width: 100%;
            padding: 15px;
            background: transparent;
            color: var(--cyan);
            border: 1px solid var(--cyan);
            border-radius: 3px;
            font-family: var(--font-display);
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 4px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 8px;
            position: relative;
            overflow: hidden;
            opacity: 0;
            animation: slideUp 0.5s ease-out forwards;
            animation-delay: 0.65s;
        }

        .btn-join::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(90deg, transparent, rgba(0,245,255,0.1), transparent);
            transform: translateX(-100%);
            transition: transform 0.5s ease;
        }

        .btn-join:hover {
            background: var(--cyan-dim);
            box-shadow: 0 0 20px rgba(0,245,255,0.3), inset 0 0 20px rgba(0,245,255,0.05);
            text-shadow: 0 0 10px var(--cyan);
            transform: translateY(-1px);
        }

        .btn-join:hover::before {
            transform: translateX(100%);
        }

        .btn-join:active {
            transform: translateY(0);
            box-shadow: 0 0 40px rgba(0,245,255,0.5);
        }

        .info-text {
            text-align: center;
            margin-top: 20px;
            color: var(--text-muted);
            font-size: 9px;
            font-family: var(--font-mono);
            letter-spacing: 2px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .info-text::before,
        .info-text::after {
            content: '';
            flex: 1;
            max-width: 40px;
            height: 1px;
            background: var(--border);
        }

        /* Error */
        .error-msg {
            background: rgba(255, 0, 110, 0.08);
            border: 1px solid rgba(255, 0, 110, 0.3);
            color: #ff4499;
            padding: 12px 16px;
            margin: 0 24px 16px;
            border-radius: 3px;
            font-family: var(--font-mono);
            font-size: 12px;
            letter-spacing: 1px;
            animation: errorFlash 0.3s ease;
        }

        @keyframes errorFlash {
            0% { opacity: 0; transform: translateX(-4px); }
            100% { opacity: 1; transform: translateX(0); }
        }

        /* ── CHAT SECTION ── */
        .chat-section {
            padding: 16px 20px;
        }

        .chat-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 14px;
            padding-bottom: 14px;
            border-bottom: 1px solid var(--border);
        }

        .chat-nav {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .back-btn {
            color: var(--text-muted);
            text-decoration: none;
            display: flex;
            align-items: center;
            transition: all 0.2s;
            padding: 6px;
            border: 1px solid transparent;
            border-radius: 3px;
        }

        .back-btn:hover {
            color: var(--cyan);
            border-color: var(--border);
            box-shadow: 0 0 8px rgba(0,245,255,0.15);
        }

        .room-label {
            font-family: var(--font-mono);
            font-size: 11px;
            color: var(--text-dim);
            letter-spacing: 1px;
        }

        .room-label span {
            color: var(--cyan);
            text-shadow: 0 0 8px var(--cyan-glow);
        }

        .users-wrapper {
            position: relative;
        }

        .room-badge {
            background: var(--cyan-dim);
            color: var(--cyan);
            border: 1px solid rgba(0,245,255,0.25);
            padding: 4px 12px;
            border-radius: 2px;
            font-family: var(--font-mono);
            font-size: 10px;
            font-weight: 500;
            letter-spacing: 1px;
            cursor: help;
            transition: all 0.2s;
        }

        .room-badge:hover {
            box-shadow: 0 0 12px rgba(0,245,255,0.3);
        }

        #userTooltip {
            position: absolute;
            right: 0; top: calc(100% + 8px);
            background: var(--panel-bright);
            border: 1px solid var(--border-bright);
            padding: 12px;
            border-radius: 3px;
            z-index: 100;
            min-width: 160px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.6), 0 0 20px rgba(0,245,255,0.08);
            max-height: 200px;
            overflow-y: auto;
        }

        .tooltip-header {
            font-size: 9px;
            color: var(--text-muted);
            margin-bottom: 8px;
            font-family: var(--font-mono);
            letter-spacing: 2px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 6px;
        }

        /* Messages */
        .messages {
            height: 340px;
            overflow-y: auto;
            padding: 12px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 3px;
            border: 1px solid var(--border);
            margin-bottom: 12px;
            scroll-behavior: smooth;
        }

        .messages::-webkit-scrollbar { width: 4px; }
        .messages::-webkit-scrollbar-track { background: transparent; }
        .messages::-webkit-scrollbar-thumb { background: var(--border-bright); border-radius: 2px; }
        .messages::-webkit-scrollbar-thumb:hover { background: var(--cyan); }

        .message {
            margin-bottom: 14px;
            max-width: 82%;
            word-wrap: break-word;
            clear: both;
            opacity: 0;
            animation: msgAppear 0.3s ease-out forwards;
        }

        @keyframes msgAppear {
            0% { opacity: 0; transform: translateY(8px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        .message.user { float: right; }
        .message.other { float: left; }
        .message.system {
            float: none;
            margin: 12px auto;
            text-align: center;
            max-width: 100%;
        }

        .message-info {
            display: flex;
            align-items: baseline;
            margin-bottom: 4px;
            gap: 8px;
        }

        .message.user .message-info { justify-content: flex-end; }

        .message .username {
            font-size: 9px;
            font-weight: 600;
            color: var(--text-muted);
            font-family: var(--font-mono);
            letter-spacing: 1px;
        }

        .message .time {
            font-size: 9px;
            color: var(--text-muted);
            font-family: var(--font-mono);
        }

        .msg-bubble {
            padding: 10px 14px;
            border-radius: 3px;
            font-size: 13px;
            line-height: 1.6;
            position: relative;
        }

        .message.user .msg-bubble {
            background: linear-gradient(135deg, rgba(0,245,255,0.15), rgba(0,245,255,0.08));
            border: 1px solid rgba(0,245,255,0.25);
            color: #e0f8ff;
            border-bottom-right-radius: 0;
            box-shadow: 0 0 15px rgba(0,245,255,0.08);
        }

        .message.other .msg-bubble {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            color: var(--text);
            border-bottom-left-radius: 0;
        }

        .message.system .msg-bubble {
            background: transparent;
            color: var(--text-muted);
            font-family: var(--font-mono);
            font-size: 10px;
            letter-spacing: 1px;
            border: none;
            padding: 4px;
        }

        .message.system .msg-bubble::before {
            content: '// ';
            color: var(--cyan);
            opacity: 0.5;
        }

        /* Message input */
        .message-input {
            display: flex;
            gap: 8px;
            clear: both;
        }

        .message-input input {
            flex: 1;
            min-width: 0;
            padding: 13px 16px;
            background: rgba(0, 245, 255, 0.03);
            color: var(--text);
            border: 1px solid var(--border);
            border-radius: 3px;
            font-family: var(--font-mono);
            font-size: 13px;
            letter-spacing: 0.5px;
            transition: all 0.3s;
        }

        .message-input input:focus {
            outline: none;
            border-color: var(--cyan);
            background: rgba(0, 245, 255, 0.05);
            box-shadow: 0 0 15px rgba(0,245,255,0.08);
            color: var(--cyan);
        }

        .message-input input::placeholder {
            color: var(--text-muted);
            font-size: 11px;
        }

        .msg-btn {
            flex-shrink: 0;
            padding: 0 16px;
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-muted);
            border-radius: 3px;
            cursor: pointer;
            transition: all 0.25s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .msg-btn:hover {
            border-color: var(--cyan);
            color: var(--cyan);
            background: var(--cyan-dim);
            box-shadow: 0 0 12px rgba(0,245,255,0.2);
        }

        .msg-btn.send-btn {
            background: var(--cyan-dim);
            border-color: rgba(0,245,255,0.4);
            color: var(--cyan);
        }

        .msg-btn.send-btn:hover {
            background: rgba(0,245,255,0.2);
            box-shadow: 0 0 20px rgba(0,245,255,0.3);
        }

        /* ── UTILITIES ── */
        .hidden { display: none !important; }

        .clearfix::after { content: ""; clear: both; display: table; }

        .users-wrapper:hover #userTooltip { display: block !important; }

        /* View once */
        .view-once-card {
            border: 1px solid rgba(0,245,255,0.2);
            background: rgba(0,245,255,0.04);
            border-radius: 3px;
            padding: 14px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.25s;
        }

        .view-once-card:hover {
            background: rgba(0,245,255,0.08);
            border-color: var(--cyan);
            box-shadow: 0 0 15px rgba(0,245,255,0.15);
        }

        .view-once-label {
            font-size: 12px;
            color: var(--cyan);
            font-family: var(--font-mono);
            font-weight: 600;
            margin-top: 6px;
            letter-spacing: 1px;
        }

        .view-once-sub {
            font-size: 9px;
            color: var(--text-muted);
            margin-top: 3px;
            font-family: var(--font-mono);
            letter-spacing: 1px;
        }

        /* Image protection layer */
        .image-container {
            position: relative;
            user-select: none;
            display: flex;
            justify-content: center;
            align-items: center;
            max-width: 90%;
            max-height: 80%;
        }

        .protection-layer {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.01);
            backdrop-filter: blur(0px);
            pointer-events: none;
            z-index: 10;
        }

        /* Responsive */
        @media (max-width: 480px) {
            .container { width: 99%; }
            .chat-section { padding: 12px; }
            .join-section { padding: 20px 16px; }
            .header { padding: 14px 16px; }
            .messages { height: 300px; }
        }

        /* Boot animation for text */
        .boot-text {
            overflow: hidden;
            white-space: nowrap;
            animation: typeIn 0.8s steps(20, end) forwards;
        }

        @keyframes typeIn {
            0% { width: 0; }
            100% { width: 100%; }
        }

        /* Glitch effect for brand */
        .glitch {
            position: relative;
        }

        .glitch::before,
        .glitch::after {
            content: attr(data-text);
            position: absolute;
            top: 0; left: 0;
            width: 100%;
        }

        .glitch::before {
            color: var(--magenta);
            animation: glitch1 4s infinite;
            clip-path: polygon(0 30%, 100% 30%, 100% 50%, 0 50%);
        }

        .glitch::after {
            color: #00aaff;
            animation: glitch2 4s infinite;
            clip-path: polygon(0 60%, 100% 60%, 100% 80%, 0 80%);
        }

        @keyframes glitch1 {
            0%, 90%, 100% { transform: translate(0); opacity: 0; }
            92% { transform: translate(-2px, 1px); opacity: 0.7; }
            94% { transform: translate(2px, -1px); opacity: 0.7; }
            96% { transform: translate(0); opacity: 0; }
        }

        @keyframes glitch2 {
            0%, 90%, 100% { transform: translate(0); opacity: 0; }
            93% { transform: translate(2px, 1px); opacity: 0.7; }
            95% { transform: translate(-2px, -1px); opacity: 0.7; }
            97% { transform: translate(0); opacity: 0; }
        }
    </style>
</head>

<body>
    <!-- Background elements -->
    <div class="grid-bg"></div>
    <div class="scanline"></div>
    <div class="corner-deco tl"></div>
    <div class="corner-deco tr"></div>
    <div class="corner-deco bl"></div>
    <div class="corner-deco br"></div>

    <!-- Particles -->
    <div class="particle" style="left:10%; --drift:30px; animation-duration:8s; animation-delay:0s;"></div>
    <div class="particle" style="left:25%; --drift:-20px; animation-duration:12s; animation-delay:2s;"></div>
    <div class="particle" style="left:50%; --drift:40px; animation-duration:10s; animation-delay:1s;"></div>
    <div class="particle" style="left:75%; --drift:-30px; animation-duration:9s; animation-delay:3s;"></div>
    <div class="particle" style="left:90%; --drift:15px; animation-duration:11s; animation-delay:0.5s;"></div>

    <div class="container">

        <!-- ── JOIN SECTION ── -->
        <div id="joinSection">
            <div class="header">
                <div class="header-brand">
                    <div class="logo-icon">
                        <div class="logo-hex">
                            <div class="logo-dot"></div>
                        </div>
                    </div>
                    <div class="brand-text">
                        <h1 class="glitch" data-text="Anonymous_chat">Anonymous_chat</h1>
                        <p>ANONYMOUS • SECURE • ENCRYPTED</p>
                    </div>
                </div>
                <div class="header-status">
                    <div class="status-badge">● ONLINE</div>
                    <div class="signal-bars">
                        <div class="signal-bar"></div>
                        <div class="signal-bar"></div>
                        <div class="signal-bar"></div>
                        <div class="signal-bar"></div>
                    </div>
                </div>
            </div>

            {% if error %}
            <div class="error-msg">⚠ {{ error }}</div>
            {% endif %}

            <div class="join-section">
                <div class="section-title">INITIALIZE CONNECTION</div>

                <form id="joinForm" method="POST" action="/join_room">
                    <div class="input-group">
                        <label for="username">// Username</label>
                        <div class="input-wrapper">
                            <span class="input-prefix">›</span>
                            <input type="text" id="username" name="username" placeholder="Enter Username..." required>
                            <div class="input-glow"></div>
                        </div>
                    </div>

                    <div class="input-group" style="position: relative;">
                        <div class="label-row">
                            <label for="room_name" style="margin-bottom: 0;">// Enter Room ID</label>
                            <div class="small-lock" id="lockToggle" onclick="togglePassword()" title="Encrypt channel">
                                <svg id="unlockedIcon" xmlns="http://www.w3.org/2000/svg" width="14" height="14"
                                    viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                                    stroke-linecap="round" stroke-linejoin="round">
                                    <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                                    <path d="M7 11V7a5 5 0 0 1 9.9-1"></path>
                                </svg>
                                <svg id="lockedIcon" class="hidden" xmlns="http://www.w3.org/2000/svg" width="14"
                                    height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                                    stroke-linecap="round" stroke-linejoin="round">
                                    <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                                    <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                                </svg>
                            </div>
                        </div>
                        <div class="input-wrapper">
                            <span class="input-prefix">#</span>
                            <input type="text" oninput="validateNumbers(this)" id="room_name" name="room_name" placeholder="Enter room ID..." required>
                            <div class="input-glow"></div>
                        </div>

                        <div id="passwordInputContainer" class="hidden"
                            style="margin-top: 12px; opacity: 0; transition: opacity 0.3s ease;">
                            <div class="input-wrapper">
                                <span class="input-prefix">🔑</span>
                                <input type="password" id="password" name="password"
                                    placeholder="Enter Password.."
                                    style="border-color: rgba(0,245,255,0.3); background: rgba(0,245,255,0.04);">
                                <div class="input-glow"></div>
                            </div>
                        </div>
                    </div>

                    <button type="submit" class="btn-join">JOIN/CREATE ROOM</button>
                </form>

                <p class="info-text">E2E ENCRYPTED // ZERO LOGS // ANONYMOUS</p>
            </div>
        </div>

        <!-- ── CHAT SECTION ── -->
        <div id="chatSection" class="hidden">
            <div class="header">
                <div class="header-brand">
                    <div class="logo-icon">
                        <div class="logo-hex">
                            <div class="logo-dot"></div>
                        </div>
                    </div>
                    <div class="brand-text">
                        <h1>Anonymous_chat</h1>
                        <p>SECURE CHANNEL ACTIVE</p>
                    </div>
                </div>
                <div id="roomInfo" style="font-family: var(--font-mono); font-size: 10px; color: var(--text-muted); letter-spacing: 1px;"></div>
            </div>

            <div class="chat-section">
                <div class="chat-header">
                    <div class="chat-nav">
                        <a href="/" class="back-btn" title="Disconnect">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <line x1="19" y1="12" x2="5" y2="12"></line>
                                <polyline points="12 19 5 12 12 5"></polyline>
                            </svg>
                        </a>
                        <div class="room-label">NODE: <span id="currentRoom"></span></div>
                    </div>
                    <div class="users-wrapper" style="position: relative;">
                        <span class="room-badge" id="userCount" style="cursor: help;">USERS: 1</span>
                        <div id="userTooltip" style="display: none;">
                            <div class="tooltip-header">// ACTIVE NODES</div>
                            <div id="userList" style="font-family: var(--font-mono); font-size: 12px; display: flex; flex-direction: column; gap: 4px; color: var(--text);"></div>
                        </div>
                    </div>
                </div>

                <div class="messages clearfix" id="messages"></div>

                <div class="message-input">
                    <input type="file" id="mediaInput" class="hidden" accept="image/*,video/*,audio/*,.pdf,.doc,.docx"
                        onchange="sendMedia()">
                    <button class="msg-btn" onclick="document.getElementById('mediaInput').click()" title="Attach">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"></path>
                        </svg>
                    </button>
                    <input type="text" id="messageInput" placeholder="Transmit message..." autocomplete="off"
                        onkeypress="if(event.key==='Enter') sendMessage()">
                    <button class="msg-btn send-btn" onclick="sendMessage()" title="Send">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="22" y1="2" x2="11" y2="13"></line>
                            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                        </svg>
                    </button>
                </div>
            </div>
        </div>

    </div><!-- /.container -->

    <script>
        function validateNumbers(input) {
            input.value = input.value.replace(/[^a-zA-Z0-9_-]/g, '');
        }

        const pathParts = window.location.pathname.split('/');
        const storedUsername = localStorage.getItem('chat_username');
        if (storedUsername && document.getElementById('username')) {
            document.getElementById('username').value = storedUsername;
        }

        if (pathParts[1] === 'room' && pathParts[2]) {
            const roomName = pathParts[2];
            document.getElementById('joinSection').classList.add('hidden');
            document.getElementById('chatSection').classList.remove('hidden');
            startChat(roomName);
        }

        function togglePassword() {
            const toggle = document.getElementById('lockToggle');
            const unlockedIcon = document.getElementById('unlockedIcon');
            const lockedIcon = document.getElementById('lockedIcon');
            const passwordContainer = document.getElementById('passwordInputContainer');
            const passwordInput = document.getElementById('password');

            if (toggle.classList.contains('is-locked')) {
                toggle.classList.remove('is-locked');
                unlockedIcon.classList.remove('hidden');
                lockedIcon.classList.add('hidden');
                passwordContainer.style.opacity = '0';
                setTimeout(() => passwordContainer.classList.add('hidden'), 300);
                passwordInput.value = '';
            } else {
                toggle.classList.add('is-locked');
                unlockedIcon.classList.add('hidden');
                lockedIcon.classList.remove('hidden');
                passwordContainer.classList.remove('hidden');
                setTimeout(() => { passwordContainer.style.opacity = '1'; }, 10);
                passwordInput.focus();
            }
        }

        function startChat(roomName) {
            const serverUsername = "{{ username or '' }}";
            let username = serverUsername || localStorage.getItem('chat_username');
            if (!username) username = 'Ghost_' + Math.random().toString(36).substr(2, 5).toUpperCase();

            localStorage.setItem('chat_username', username);
            document.getElementById('currentRoom').textContent = roomName;
            document.getElementById('roomInfo').textContent = `[UID: ${username}]`;

            const socket = io({ transports: ['websocket'] });

            socket.on('connect', () => {
                socket.emit('join', { room: roomName, username: username });
            });

            socket.on('welcome', (data) => {
                addMessage('system', `Channel connection established → ${data.room}`, 'System');
            });

            socket.on('message', (data) => {
                if (data.type === 'user') {
                    const isOwn = data.username === username;
                    addMessage(isOwn ? 'user' : 'other', data.message, data.username, data.media, data.media_type);
                } else {
                    addMessage('system', data.message, 'System');
                }
            });

            socket.on('update_users', (data) => {
                const users = data.users || [];
                document.getElementById('userCount').textContent = `USERS: ${users.length}`;
                const userList = document.getElementById('userList');
                userList.innerHTML = '';
                users.forEach(u => {
                    const div = document.createElement('div');
                    div.textContent = '▸ ' + u;
                    if (u === username) {
                        div.style.color = 'var(--cyan)';
                        div.style.textShadow = '0 0 8px var(--cyan)';
                        div.textContent += ' [YOU]';
                    }
                    userList.appendChild(div);
                });
            });

            window.sendMessage = function () {
                const input = document.getElementById('messageInput');
                const message = input.value.trim();
                if (message) {
                    socket.emit('message', { message: message });
                    input.value = '';
                }
            };

            window.sendMedia = function () {
                const fileInput = document.getElementById('mediaInput');
                const file = fileInput.files[0];
                if (!file) return;
                if (file.size > 5 * 1024 * 1024) {
                    alert("File too large! Max 5MB.");
                    fileInput.value = '';
                    return;
                }
                const reader = new FileReader();
                reader.onload = function (e) {
                    socket.emit('message', {
                        message: file.name,
                        media: e.target.result,
                        media_type: file.type || 'application/octet-stream'
                    });
                };
                reader.readAsDataURL(file);
                fileInput.value = '';
            };
        }

        function addMessage(type, message, username, media = null, mediaType = null) {
            const messagesDiv = document.getElementById('messages');
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${type}`;

            const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            let contentHtml = '';

            if (media) {
                if (mediaType && mediaType.startsWith('image/')) {
                    const uniqueId = 'img_' + Math.random().toString(36).substr(2, 9);
                    contentHtml = `
                        <div id="${uniqueId}_container" class="view-once-card" onclick="viewOnceImage('${uniqueId}', '${media}')">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--cyan)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
                            <div class="view-once-label">VIEW PHOTO</div>
                            <div class="view-once-sub">ONE-TIME ACCESS</div>
                        </div>`;
                } else if (mediaType && mediaType.startsWith('video/')) {
                    contentHtml = `<video controls style="max-width:100%;max-height:200px;border-radius:3px;border:1px solid var(--border);margin-bottom:5px;"><source src="${media}" type="${mediaType}"></video><br><a href="${media}" download="${message}" style="color:var(--cyan);text-decoration:none;font-family:var(--font-mono);font-size:12px;">↓ ${message}</a>`;
                } else if (mediaType && mediaType.startsWith('audio/')) {
                    contentHtml = `<audio controls style="max-width:100%;margin-bottom:5px;"><source src="${media}" type="${mediaType}"></audio><br><a href="${media}" download="${message}" style="color:var(--cyan);text-decoration:none;font-family:var(--font-mono);font-size:12px;">↓ ${message}</a>`;
                } else {
                    contentHtml = `<a href="${media}" download="${message}" style="color:var(--cyan);text-decoration:none;font-family:var(--font-mono);font-size:12px;">↓ ${message}</a>`;
                }
            } else {
                const div = document.createElement('div');
                div.innerText = message;
                contentHtml = div.innerHTML;
            }

            if (type === 'system') {
                const div = document.createElement('div');
                div.innerText = message;
                msgDiv.innerHTML = `<div class="msg-bubble">${div.innerHTML}</div>`;
            } else {
                msgDiv.innerHTML = `
                    <div class="message-info">
                        <span class="username">${username}</span>
                        <span class="time">${time}</span>
                    </div>
                    <div class="msg-bubble">${contentHtml}</div>`;
            }

            messagesDiv.appendChild(msgDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        function handleAntiScreenshot(e) {
            if (e.key === 'PrintScreen' || (e.ctrlKey && e.key === 'p') || (e.metaKey && e.shiftKey)) {
                document.getElementById('viewOnceImg').style.opacity = '0';
                closeViewOnce();
            }
        }
        function handleFocusLoss() {
            document.getElementById('viewOnceImg').style.opacity = '0';
            closeViewOnce();
        }
        function handleVisibilityChange() {
            if (document.visibilityState === 'hidden') {
                document.getElementById('viewOnceImg').style.opacity = '0';
                closeViewOnce();
            }
        }
        function preventContextMenu(e) { e.preventDefault(); }

        function viewOnceImage(id, data) {
            const container = document.getElementById(id + '_container');
            if (!container) return;
            const modal = document.getElementById('viewOnceModal');
            const img = document.getElementById('viewOnceImg');
            img.src = data;
            img.style.opacity = '1';
            modal.classList.remove('hidden');
            document.addEventListener('keyup', handleAntiScreenshot);
            document.addEventListener('keydown', handleAntiScreenshot);
            window.addEventListener('blur', handleFocusLoss);
            document.addEventListener('visibilitychange', handleVisibilityChange);
            document.addEventListener('contextmenu', preventContextMenu);
            container.innerHTML = `<div style="font-family:var(--font-mono);font-size:11px;color:var(--text-muted);display:flex;align-items:center;justify-content:center;gap:6px;padding:10px;">✓ ACCESSED</div>`;
            container.style.background = 'transparent';
            container.style.borderStyle = 'dashed';
            container.style.cursor = 'default';
            container.onclick = null;
            container.onmouseover = null;
            container.onmouseout = null;
        }

        function closeViewOnce() {
            const modal = document.getElementById('viewOnceModal');
            const img = document.getElementById('viewOnceImg');
            modal.classList.add('hidden');
            img.src = '';
            img.style.opacity = '1';
            document.removeEventListener('keyup', handleAntiScreenshot);
            document.removeEventListener('keydown', handleAntiScreenshot);
            window.removeEventListener('blur', handleFocusLoss);
            document.removeEventListener('visibilitychange', handleVisibilityChange);
            document.removeEventListener('contextmenu', preventContextMenu);
        }
    </script>

    <!-- View Once Modal -->
    <div id="viewOnceModal" class="hidden"
        style="position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.96);z-index:9999;display:flex;justify-content:center;align-items:center;flex-direction:column;backdrop-filter:blur(10px);">
        <button onclick="closeViewOnce()"
            style="position:absolute;top:20px;right:20px;background:rgba(0,245,255,0.08);border:1px solid rgba(0,245,255,0.2);color:var(--cyan);cursor:pointer;width:40px;height:40px;border-radius:3px;display:flex;align-items:center;justify-content:center;transition:all 0.2s;font-family:var(--font-mono);"
            onmouseover="this.style.background='rgba(0,245,255,0.15)';this.style.boxShadow='0 0 15px rgba(0,245,255,0.3)'"
            onmouseout="this.style.background='rgba(0,245,255,0.08)';this.style.boxShadow='none'">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="18" y1="6" x2="6" y2="18"></line>
                <line x1="6" y1="6" x2="18" y2="18"></line>
            </svg>
        </button>
        <div class="image-container">
            <img id="viewOnceImg"
                style="max-width:100%;max-height:75vh;border-radius:3px;border:1px solid rgba(0,245,255,0.2);box-shadow:0 0 40px rgba(0,245,255,0.15);user-select:none;-webkit-user-drag:none;pointer-events:none;transition:opacity 0.1s;">
            <div class="protection-layer"></div>
        </div>
        <div style="color:var(--text-muted);margin-top:20px;font-family:var(--font-mono);font-size:10px;display:flex;align-items:center;gap:8px;letter-spacing:2px;">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
            SELF-DESTRUCT ON CLOSE // SCREENSHOT RESTRICTED
        </div>
    </div>
</body>
</html>
