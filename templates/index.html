<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IP Chat - Secure Communications</title>
    <script src="https://cdn.socket.io/4.5.0/socket.io.min.js"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Fira+Code:wght@400;500&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg-color: #0b0f19;
            --container-bg: #111827;
            --input-bg: #1f2937;
            --border-color: #374151;
            --accent-green: #10b981;
            --accent-green-hover: #059669;
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --font-sans: 'Inter', -apple-system, sans-serif;
            --font-mono: 'Fira Code', 'Courier New', monospace;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
         }
        body {
            font-family: var(--font-sans);
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-image:
                radial-gradient(circle at 15% 50%, rgba(16, 185, 129, 0.05), transparent 30%),
                radial-gradient(circle at 85% 30%, rgba(16, 185, 129, 0.05), transparent 30%);
            background-size: 200% 200%;
            animation: bgShift 15s ease-in-out infinite;
        }

        .container {
            background: var(--container-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5), 0 0 20px rgba(16, 185, 129, 0.05);
            width: 95%;
            max-width: 480px;
            overflow: hidden;
            position: relative;
            animation: popIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .header {
            padding: 25px 30px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(17, 24, 39, 0.95);
        }

        .header-brand {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background-color: var(--accent-green);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--accent-green);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% {
                box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7);
            }

            70% {
                box-shadow: 0 0 0 6px rgba(16, 185, 129, 0);
            }

            100% {
                box-shadow: 0 0 0 0 rgba(16, 185, 129, 0);
            }
        }

        @keyframes fadeInSlideUp {
            0% {
                opacity: 0;
                transform: translateY(15px);
            }

            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes popIn {
            0% {
                opacity: 0;
                transform: scale(0.96);
            }

            100% {
                opacity: 1;
                transform: scale(1);
            }
        }

        @keyframes bgShift {
            0% {
                background-position: 0% 50%;
            }

            50% {
                background-position: 100% 50%;
            }

            100% {
                background-position: 0% 50%;
            }
        }

        .header h1 {
            font-family: var(--font-mono);
            font-size: 18px;
            font-weight: 600;
            letter-spacing: -0.5px;
            color: #fff;
        }

        .header p {
            color: var(--text-muted);
            font-size: 12px;
            font-family: var(--font-mono);
        }

        .join-section {
            padding: 30px;
        }

        .join-section h2 {
            font-size: 18px;
            font-weight: 500;
            color: var(--text-main);
            margin-bottom: 25px;
        }

        .input-group {
            margin-bottom: 20px;
            opacity: 0;
            animation: fadeInSlideUp 0.5s ease-out forwards;
        }

        .input-group:nth-child(1) {
            animation-delay: 0.1s;
        }

        .input-group:nth-child(2) {
            animation-delay: 0.2s;
        }

        .input-group:nth-child(3) {
            animation-delay: 0.3s;
        }

        .input-group label {
            display: block;
            font-size: 13px;
            color: var(--text-muted);
            margin-bottom: 8px;
            font-family: var(--font-mono);
        }

        .input-group input {
            width: 100%;
            padding: 14px 16px;
            background: var(--input-bg);
            color: var(--text-main);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            font-family: var(--font-sans);
            font-size: 15px;
            transition: all 0.2s ease;
        }

        .input-group input:focus {
            outline: none;
            border-color: var(--accent-green);
            box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.15);
        }

        .input-group input::placeholder {
            color: #6b7280;
        }

        .input-group .optional {
            font-size: 11px;
            color: #6b7280;
            font-style: italic;
            font-family: var(--font-sans);
        }

        .btn-join {
            width: 100%;
            padding: 14px;
            background: var(--accent-green);
            color: #fff;
            border: none;
            border-radius: 10px;
            font-family: var(--font-sans);
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 10px;
            opacity: 0;
            animation: fadeInSlideUp 0.5s ease-out forwards;
            animation-delay: 0.4s;
        }

        .btn-join:hover {
            background: var(--accent-green-hover);
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.2);
        }

        .info-text {
            text-align: center;
            margin-top: 25px;
            color: var(--text-muted);
            font-size: 12px;
            font-family: var(--font-mono);
        }

        .chat-section {
            padding: 20px;
        }

        .chat-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 15px;
            border-bottom: 1px solid var(--border-color);
        }

        .chat-header h3 {
            color: var(--text-main);
            font-size: 15px;
            font-weight: 500;
        }

        .chat-header h3 span {
            color: var(--accent-green);
            font-family: var(--font-mono);
        }

        .chat-header .room-badge {
            background: rgba(16, 185, 129, 0.1);
            color: var(--accent-green);
            border: 1px solid rgba(16, 185, 129, 0.2);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
        }

        .messages {
            height: 380px;
            overflow-y: auto;
            padding: 15px 10px 15px 15px;
            background: var(--bg-color);
            border-radius: 12px;
            border: 1px solid var(--border-color);
            margin-bottom: 15px;
        }

        .messages::-webkit-scrollbar {
            width: 6px;
        }

        .messages::-webkit-scrollbar-track {
            background: transparent;
        }

        .messages::-webkit-scrollbar-thumb {
            background: #374151;
            border-radius: 10px;
        }

        .messages::-webkit-scrollbar-thumb:hover {
            background: #4b5563;
        }

        .message {
            margin-bottom: 15px;
            max-width: 85%;
            word-wrap: break-word;
            clear: both;
            opacity: 0;
            animation: fadeInSlideUp 0.3s ease-out forwards;
        }

        .message.user {
            float: right;
        }

        .message.other {
            float: left;
        }

        .message.system {
            float: none;
            margin: 15px auto;
            text-align: center;
            max-width: 100%;
        }

        .msg-bubble {
            padding: 10px 14px;
            border-radius: 12px;
            font-size: 14px;
            line-height: 1.5;
            position: relative;
        }

        .message.user .msg-bubble {
            background: var(--accent-green);
            color: #fff;
            border-bottom-right-radius: 2px;
        }

        .message.other .msg-bubble {
            background: var(--input-bg);
            color: var(--text-main);
            border: 1px solid var(--border-color);
            border-bottom-left-radius: 2px;
        }

        .message.system .msg-bubble {
            background: transparent;
            color: var(--text-muted);
            font-family: var(--font-mono);
            font-size: 12px;
            border: none;
            padding: 5px;
        }

        .message-info {
            display: flex;
            align-items: baseline;
            margin-bottom: 4px;
            gap: 8px;
        }

        .message.user .message-info {
            justify-content: flex-end;
        }

        .message .username {
            font-size: 12px;
            font-weight: 600;
            color: var(--text-muted);
        }

        .message .time {
            font-size: 10px;
            color: #6b7280;
        }

        .message-input {
            display: flex;
            gap: 10px;
            clear: both;
        }

        .message-input input {
            flex: 1;
            padding: 14px 16px;
            background: var(--input-bg);
            color: var(--text-main);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            font-family: var(--font-sans);
            font-size: 14px;
            transition: all 0.2s;
        }

        .message-input input:focus {
            outline: none;
            border-color: var(--accent-green);
        }

        .message-input button {
            padding: 0 24px;
            background: var(--accent-green);
            color: #fff;
            border: none;
            border-radius: 10px;
            font-family: var(--font-sans);
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .message-input button:hover {
            background: var(--accent-green-hover);
        }

        .lock-toggle {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px 16px;
            background: rgba(31, 41, 55, 0.5);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .lock-toggle:hover {
            background: rgba(31, 41, 55, 0.8);
            border-color: #4b5563;
        }

        .lock-toggle.is-locked {
            border-color: var(--accent-green);
            background: rgba(16, 185, 129, 0.1);
        }

        .lock-toggle.is-locked svg {
            color: var(--accent-green);
        }

        .lock-toggle svg {
            color: var(--text-muted);
            transition: color 0.3s ease;
        }

        .lock-text {
            font-family: var(--font-mono);
            font-size: 13px;
            color: var(--text-muted);
            transition: color 0.3s ease;
        }

        .lock-toggle.is-locked .lock-text {
            color: var(--accent-green);
        }

        .hidden {
            display: none !important;
        }

        .clearfix::after {
            content: "";
            clear: both;
            display: table;
        }
    </style>
</head>

<body>
    <div class="container">
        <!-- Join Section -->
        <div id="joinSection">
            <div class="header">
                <div class="header-brand">
                    <div class="status-dot"></div>
                    <h1>IP_CHAT</h1>
                </div>
                <p>v2.0_SECURE</p>
            </div>
            <div class="join-section">
                <h2>Initialize Connection</h2>
                <form id="joinForm" method="POST" action="/join_room">
                    <div class="input-group">
                        <label for="username">IDENTIFIER (Username)</label>
                        <input type="text" id="username" name="username" placeholder="Enter your alias..." required>
                    </div>
                    <div class="input-group">
                        <label for="room_name">HOST / ROOM_ID</label>
                        <input type="text" id="room_name" name="room_name" placeholder="Enter target node..." required>
                    </div>
                    <div class="input-group">
                        <label>Security Level</label>
                        <div class="lock-toggle" id="lockToggle" onclick="togglePassword()">
                            <svg id="unlockedIcon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 9.9-1"></path></svg>
                            <svg id="lockedIcon" class="hidden" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
                            <span class="lock-text" id="lockText">Open Channel (Click to Secure)</span>
                        </div>
                        
                        <div id="passwordInputContainer" class="hidden" style="margin-top: 15px; opacity: 0; transition: opacity 0.3s ease;">
                            <input type="password" id="password" name="password" placeholder="Enter secure key...">
                        </div>
                    </div>
                    <button type="submit" class="btn-join">Login</button>
                </form>
                <p class="info-text">SECURE END-TO-END ENCRYPTED CHANNEL</p>
            </div>
        </div>

        <!-- Chat Section -->
        <div id="chatSection" class="hidden">
            <div class="header">
                <div class="header-brand">
                    <div class="status-dot"></div>
                    <h1>IP_CHAT</h1>
                </div>
                <div id="roomInfo" style="font-size: 12px; color: var(--text-muted); font-family: var(--font-mono);">
                </div>
            </div>
            <div class="chat-section">
                <div class="chat-header">
                    <h3>Connected to: <span id="currentRoom"></span></h3>
                    <span class="room-badge" id="userCount">Active</span>
                </div>
                <div class="messages clearfix" id="messages"></div>
                <div class="message-input">
                    <input type="text" id="messageInput" placeholder="Enter command or message..." autocomplete="off"
                        onkeypress="if(event.key==='Enter') sendMessage()">
                    <button onclick="sendMessage()">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="22" y1="2" x2="11" y2="13"></line>
                            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                        </svg>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const pathParts = window.location.pathname.split('/');

        const storedUsername = localStorage.getItem('chat_username');
        if (storedUsername && document.getElementById('username')) {
            document.getElementById('username').value = storedUsername;
        }

        if (pathParts[1] === 'room' && pathParts[2]) {
            const roomName = pathParts[2];
            document.getElementById('joinSection').classList.add('hidden');
            document.getElementById('chatSection').classList.remove('hidden');
            startChat(roomName);
        }

        function togglePassword() {
            const toggle = document.getElementById('lockToggle');
            const unlockedIcon = document.getElementById('unlockedIcon');
            const lockedIcon = document.getElementById('lockedIcon');
            const lockText = document.getElementById('lockText');
            const passwordContainer = document.getElementById('passwordInputContainer');
            const passwordInput = document.getElementById('password');

            if (toggle.classList.contains('is-locked')) {
                // Unlock
                toggle.classList.remove('is-locked');
                unlockedIcon.classList.remove('hidden');
                lockedIcon.classList.add('hidden');
                lockText.textContent = 'Open Channel (Click to Secure)';
                
                passwordContainer.style.opacity = '0';
                setTimeout(() => {
                    passwordContainer.classList.add('hidden');
                }, 300);
                passwordInput.value = ''; // clear password when unlocked
            } else {
                // Lock
                toggle.classList.add('is-locked');
                unlockedIcon.classList.add('hidden');
                lockedIcon.classList.remove('hidden');
                lockText.textContent = 'Secured Channel (Click to Open)';
                
                passwordContainer.classList.remove('hidden');
                setTimeout(() => {
                    passwordContainer.style.opacity = '1';
                }, 10);
                passwordInput.focus();
            }
        }

        function startChat(roomName) {
            const serverUsername = "{{ username or '' }}";
            let username = serverUsername || localStorage.getItem('chat_username');

            if (!username) {
                username = 'Guest_' + Math.random().toString(36).substr(2, 5);
            }

            localStorage.setItem('chat_username', username);

            document.getElementById('currentRoom').textContent = roomName;
            document.getElementById('roomInfo').textContent = `[UID: ${username}]`;

            const socket = io({ transports: ['websocket'] });

            socket.on('connect', () => {
                socket.emit('join', { room: roomName, username: username });
            });

            socket.on('welcome', (data) => {
                addMessage('system', `Channel connection established to ${data.room}`, 'System');
            });

            socket.on('message', (data) => {
                if (data.type === 'user') {
                    const isOwn = data.username === username;
                    addMessage(isOwn ? 'user' : 'other', data.message, data.username);
                } else {
                    addMessage('system', data.message, 'System');
                }
            });

            window.sendMessage = function () {
                const input = document.getElementById('messageInput');
                const message = input.value.trim();
                if (message) {
                    socket.emit('message', { message: message });
                    input.value = '';
                }
            };
        }

        function addMessage(type, message, username) {
            const messagesDiv = document.getElementById('messages');
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${type}`;

            const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

            if (type === 'system') {
                msgDiv.innerHTML = `<div class="msg-bubble">> ${message}</div>`;
            } else {
                msgDiv.innerHTML = `
                    <div class="message-info">
                        <span class="username">${username}</span>
                        <span class="time">${time}</span>
                    </div>
                    <div class="msg-bubble">${message}</div>
                `;
            }

            messagesDiv.appendChild(msgDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }
    </script>
</body>

</html>
